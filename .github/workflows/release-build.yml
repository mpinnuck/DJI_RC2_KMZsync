name: Build And Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            spec: DJI_RC2_KMZsync_w.spec
            asset_name: DJI_RC2_KMZsync_windows.zip
          - os: macos-latest
            spec: DJI_RC2_KMZsync_m.spec
            asset_name: DJI_RC2_KMZsync_macos.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --noconfirm --clean --distpath distm ${{ matrix.spec }}

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path distm/DJI_RC2_KMZsync/* -DestinationPath ${{ matrix.asset_name }} -Force

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent distm/DJI_RC2_KMZsync.app ${{ matrix.asset_name }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/DJI_RC2_KMZsync_windows.zip
            artifacts/**/DJI_RC2_KMZsync_macos.zip
          generate_release_notes: true
